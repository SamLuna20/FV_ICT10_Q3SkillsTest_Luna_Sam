<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>ICT 10 PYTHON</title>
    <!-- Additional styles -->
    <style>
        body{
            background: #ff5482;
            background: linear-gradient(90deg,rgba(255, 84, 130, 1) 0%, rgba(255, 255, 135, 1) 35%, rgba(146, 232, 152, 1) 65%, rgba(53, 118, 184, 1) 100%);
        }
        .su-form{
            width: 500px;
            max-width: 500px; /* to make the width size of the form 500px */
        }
    </style>
</head>
<body class="justify-content-center align-items-center d-flex vh-100">
    <div class="card p-4 su-form shadow-lg">
        <h1 class="text-center">Create Account</h1>
        <br />
        <!-- Sign Up Form -->
        <form>
            <div class="mb-3">
                <label class="form-label" for="name">Full Name (Title Case Format Required):</label>
                <input class="form-control" type="text" id="name">
            </div>
            <div class="mb-3">
                <label class="form-label" for="user">Username</label>
                <input class="form-control" type="text" id="user">
            </div>
            <div class="mb-3">
                <label class="form-label" for="pass">Password</label>
                <input class="form-control" type="password" id="pass">
            </div>
            <div class="mb-3 d-grid">
                <button class="btn btn-dark" type="button" py-click="check">Sign Up</button>
            </div>
        </form>
        <!-- Result -->
        <div class="text-center">
            <p id="result"></p>
            <p id="resultN"></p>
            <p id="resultU"></p>
            <p id="resultP"></p>
            <p id="resultP1"></p>
            <p id="resultP2"></p>
        </div>
    </div>

    <!-- linking python codes -->
        <script type="py" src="main.py"></script>
</body>
</html>
